<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Dashboard</title>
    <style>
        :root {
            --bg: #000000;
            --accent: #28a745;
            --pos-highlight: #ffc107;
            --input-bg: #1a1a1a;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 10px;
            overflow: hidden; /* Prevents bouncing */
        }
        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .label-main { 
            font-size: 0.9rem; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin-top: 10px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0 20px 0;
            background: var(--input-bg);
            border: 2px solid #333;
            border-radius: 12px;
            font-size: 2.5rem; 
            color: white;
            text-align: center;
            font-weight: 800;
        }

        /* Side-by-Side Layout */
        .results-grid {
            display: flex;
            gap: 10px;
            height: 180px; /* Fixed height to stay above keyboard */
        }

        /* Left Side: POS Command */
        .pos-box {
            flex: 1.5; /* Takes more room */
            background: var(--pos-highlight);
            color: #000;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            line-height: 1.1;
        }
        .small-txt { font-size: 1rem; font-weight: 800; text-transform: uppercase; }
        .big-num { font-size: 4.5rem; font-weight: 900; margin: 5px 0; }

        /* Right Side: Total Price */
        .price-box {
            flex: 1;
            background: #111;
            border: 2px solid #222;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .price-label { font-size: 0.7rem; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .price-total { font-size: 1.8rem; color: var(--accent); font-weight: 800; }
    </style>
</head>
<body>

<div class="container">
    <div class="label-main">Number of Items</div>
    <input type="number" id="quantity" pattern="\d*" inputmode="numeric" placeholder="0" oninput="calculatePrice()">
    
    <div class="results-grid">
        <div class="pos-box">
            <div class="small-txt">ENTER</div>
            <div id="pos-num" class="big-num">0</div>
            <div class="small-txt">IN POS</div>
        </div>

        <div class="price-box">
            <div class="price-label">Total Price</div>
            <div id="output" class="price-total">$0.00</div>
            <div class="price-label" style="margin-top: 10px;">(No Tax)</div>
        </div>
    </div>
</div>

<script>
    function calculatePrice() {
        const q = parseInt(document.getElementById('quantity').value) || 0;

        const freeItems = Math.floor(q / 30) * 10;
        const billableItems = q - freeItems;
        const totalCost = billableItems * 0.50;

        document.getElementById('pos-num').innerText = billableItems;
        document.getElementById('output').innerText = "$" + totalCost.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }
</script>

</body>
</html>
