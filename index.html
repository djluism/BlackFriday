<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Calculator</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #000000; /* Pure black for total immersion */
            --accent: #28a745;
            --text: #ffffff;
            --pos-highlight: #ffc107;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            padding: 10px;
        }
        .calculator-card {
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-sizing: border-box;
        }
        .label-main { 
            font-size: 1.2rem; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: 700;
            margin-top: 20px;
        }
        
        input {
            width: 100%;
            padding: 25px;
            margin: 15px 0 40px 0;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            font-size: 3rem; 
            color: white;
            text-align: center;
            box-sizing: border-box;
            font-weight: 800;
        }
        input:focus { outline: none; border-color: var(--pos-highlight); }

        /* The 3-Line Instruction Stack */
        .pos-stack {
            background: var(--pos-highlight);
            color: #000;
            padding: 30px 10px;
            border-radius: 16px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            line-height: 1;
        }
        .stack-line { font-size: 1.8rem; font-weight: 800; text-transform: uppercase; }
        .stack-number { font-size: 7rem; font-weight: 900; margin: 10px 0; }

        .price-label { font-size: 1rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .total { font-size: 4rem; color: var(--accent); font-weight: 900; margin: 5px 0; }
    </style>
</head>
<body>

<div class="calculator-card">
    <div class="label-main">Number of Items</div>
    
    <input type="number" id="quantity" pattern="\d*" inputmode="numeric" placeholder="0" oninput="calculatePrice()">
    
    <div class="pos-stack">
        <div class="stack-line">ENTER</div>
        <div id="pos-num" class="stack-number">0</div>
        <div class="stack-line">IN POS</div>
    </div>
    
    <div class="price-label">Total Price (No Tax)</div>
    <div class="total" id="output">$0.00</div>
</div>

<script>
    function calculatePrice() {
        const input = document.getElementById('quantity');
        const output = document.getElementById('output');
        const posNum = document.getElementById('pos-num');
        
        const q = parseInt(input.value) || 0;

        // Formula: 10 free for every 30
        const freeItems = Math.floor(q / 30) * 10;
        const billableItems = q - freeItems;
        const totalCost = billableItems * 0.50;

        posNum.innerText = billableItems;
        output.innerText = "$" + totalCost.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }
</script>

</body>
</html>
