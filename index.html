<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Calculator</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #111111;
            --accent: #28a745;
            --text: #ffffff;
            --pos-bg: #ffc107;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            padding-top: 20px;
        }
        .calculator-card {
            background: var(--card-bg);
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            min-height: 90vh; /* Covers most of the screen */
            text-align: center;
            box-sizing: border-box;
        }
        h2 { font-size: 2.5rem; margin-bottom: 0.5rem; letter-spacing: -1px; }
        .sub-head { color: #888; font-size: 1.1rem; margin-bottom: 2rem; }
        
        input {
            width: 100%;
            padding: 20px;
            margin: 20px 0;
            background: #222;
            border: 2px solid #333;
            border-radius: 12px;
            font-size: 2rem; /* Big font for entry */
            color: white;
            text-align: center;
            box-sizing: border-box;
        }
        input:focus { outline: none; border-color: #007bff; }

        .pos-instruction {
            background: var(--pos-bg);
            color: #000;
            padding: 25px;
            border-radius: 12px;
            font-weight: 900;
            margin-bottom: 30px;
            font-size: 1.8rem; /* Massive for the associate */
            text-transform: uppercase;
        }
        .label { font-size: 1rem; color: #888; text-transform: uppercase; font-weight: bold; margin-top: 20px; }
        .total { font-size: 4.5rem; color: var(--accent); font-weight: 900; margin: 10px 0; }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>Price Calc</h2>
    <div class="sub-head">$0.50 ea | Buy 20, Get 10 Free</div>
    
    <input type="number" id="quantity" pattern="\d*" inputmode="numeric" placeholder="Qty Counter" oninput="calculatePrice()">
    
    <div id="pos-display" class="pos-instruction">Enter 0 in POS</div>
    
    <div class="label">Total Price (No Tax)</div>
    <div class="total" id="output">$0.00</div>
</div>

<script>
    function calculatePrice() {
        const input = document.getElementById('quantity');
        const output = document.getElementById('output');
        const posDisplay = document.getElementById('pos-display');
        
        const q = parseInt(input.value) || 0;

        const freeItems = Math.floor(q / 30) * 10;
        const billableItems = q - freeItems;
        const totalCost = billableItems * 0.50;

        posDisplay.innerText = "Enter " + billableItems + " in POS";
        output.innerText = "$" + totalCost.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }
</script>

</body>
</html>
