<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon POS Dashboard</title>
    <style>
        :root {
            --bg: #000000;
            /* Neon Colors */
            --neon-red: #ff3131;
            --neon-yellow: #fff200;
            --neon-green: #39ff14;
            --input-bg: #0a0a0a;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px 15px; /* Extra top padding to fix the "out of bounds" look */
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .label-main { 
            font-size: 1rem; 
            color: var(--neon-red); 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: 900;
            text-shadow: 0 0 5px var(--neon-red), 0 0 10px var(--neon-red);
            margin-bottom: 10px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 25px;
            background: var(--input-bg);
            border: 2px solid var(--neon-red);
            border-radius: 12px;
            font-size: 2.8rem; 
            color: white;
            text-align: center;
            font-weight: 800;
            box-shadow: inset 0 0 10px var(--neon-red), 0 0 15px rgba(255, 49, 49, 0.2);
            box-sizing: border-box; /* Keeps border inside the box */
        }

        .results-grid {
            display: flex;
            gap: 12px;
            height: 190px;
        }

        /* Left Side: Neon Yellow POS */
        .pos-box {
            flex: 1.4;
            background: #000;
            border: 3px solid var(--neon-yellow);
            color: var(--neon-yellow);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            line-height: 1.1;
            box-shadow: 0 0 15px rgba(255, 242, 0, 0.3);
            text-shadow: 0 0 5px var(--neon-yellow);
        }
        .small-txt { font-size: 1.1rem; font-weight: 900; text-transform: uppercase; }
        .big-num { font-size: 5rem; font-weight: 900; margin: 5px 0; }

        /* Right Side: Neon Green Price */
        .price-box {
            flex: 1;
            background: #000;
            border: 3px solid var(--neon-green);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }
        .price-label { 
            font-size: 0.7rem; 
            color: var(--neon-green); 
            text-transform: uppercase; 
            font-weight: 800;
            text-shadow: 0 0 5px var(--neon-green);
        }
        .price-total { 
            font-size: 2rem; 
            color: var(--neon-green); 
            font-weight: 900; 
            text-shadow: 0 0 8px var(--neon-green);
            margin: 5px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="label-main">Number of Items</div>
    <input type="number" id="quantity" pattern="\d*" inputmode="numeric" placeholder="0" oninput="calculatePrice()">
    
    <div class="results-grid">
        <div class="pos-box">
            <div class="small-txt">ENTER</div>
            <div id="pos-num" class="big-num">0</div>
            <div class="small-txt">IN POS</div>
        </div>

        <div class="price-box">
            <div class="price-label">TOTAL PRICE</div>
            <div id="output" class="price-total">$0.00</div>
            <div class="price-label" style="font-size: 0.6rem; opacity: 0.7;">(NO TAX)</div>
        </div>
    </div>
</div>

<script>
    function calculatePrice() {
        const q = parseInt(document.getElementById('quantity').value) || 0;
        const freeItems = Math.floor(q / 30) * 10;
        const billableItems = q - freeItems;
        const totalCost = billableItems * 0.50;

        document.getElementById('pos-num').innerText = billableItems;
        document.getElementById('output').innerText = "$" + totalCost.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }
</script>

</body>
</html>
