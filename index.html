<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Pricing Calculator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .calculator-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #1c1e21; margin-bottom: 0.5rem; }
        p { color: #65676b; font-size: 0.9rem; margin-bottom: 1.5rem; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #007bff; }
        .result-box {
            margin-top: 1.5rem;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .pos-instruction {
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 0.95rem;
            border: 1px solid #ffeeba;
        }
        .label { font-size: 0.8rem; color: #6c757d; text-transform: uppercase; font-weight: bold; }
        .total { font-size: 2.2rem; color: #28a745; font-weight: 800; margin: 5px 0; }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>Price Calculator</h2>
    <p>$0.50 per item. Buy 20, get 10 free.</p>
    
    <input type="number" id="quantity" placeholder="Actual items at counter..." oninput="calculatePrice()">
    
    <div class="result-box">
        <div id="pos-display" class="pos-instruction">Enter 0 in POS</div>
        
        <div class="label">Total Price (No Tax)</div>
        <div class="total" id="output">$0.00</div>
    </div>
</div>

<script>
    function calculatePrice() {
        const input = document.getElementById('quantity');
        const output = document.getElementById('output');
        const posDisplay = document.getElementById('pos-display');
        
        const q = parseInt(input.value) || 0;

        // Logic: 10 free items for every full block of 30
        const freeItems = Math.floor(q / 30) * 10;
        const billableItems = q - freeItems;
        const totalCost = billableItems * 0.50;

        // Update the display
        posDisplay.innerText = "Enter " + billableItems + " in POS";
        output.innerText = "$" + totalCost.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }
</script>

</body>
</html>
